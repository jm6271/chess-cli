name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      # Use the SDK required by the net10.0 projects.
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore chess-cli.slnx

      - name: Build solution
        run: dotnet build chess-cli.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test chess-cli.slnx --configuration Release --no-build
